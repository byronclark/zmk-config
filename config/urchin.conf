# Enable mouse key support (for MOUSE layer)
CONFIG_ZMK_POINTING=y

# Increase BT TX power to improve split half sync and host connection
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Fetch and proxy right half battery level to host
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
